<!DOCTYPE html>
<html lang="sw" data-mgrid-default-lang="sw">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fungua M-ID yako — M-Grid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="../assets/css/mgrid-variables.css" rel="stylesheet" />
    <link href="../assets/css/mgrid-overrides.css" rel="stylesheet" />
    <link href="../assets/css/mgrid-components.css" rel="stylesheet" />
    <link href="../assets/css/mgrid-animations.css" rel="stylesheet" />
    <link href="../assets/css/mgrid-reference-theme.css" rel="stylesheet" />
  </head>
  <body class="bg-white">
    <div class="min-vh-100 d-lg-flex">
      <!-- Left panel -->
      <div class="d-none d-lg-flex flex-column justify-content-between col-lg-5 mgrid-register-left p-5">
        <div>
          <div class="mgrid-logo-text-light mb-4">M·GRID</div>
          <p class="lead text-white opacity-90 mgrid-register-lead" data-i18n="register.left_lead">
            Njia yako ya fursa huanza na M-ID moja.
          </p>
        </div>
        <div class="mgrid-mid-card text-dark mt-4">
          <div class="small text-muted text-uppercase" data-i18n="register.sample_card">Kadi ya mfano</div>
          <div class="mgrid-mid-card-mono">M-2026-000104</div>
          <div class="fw-semibold mt-2">Neema Joseph</div>
          <div class="small text-muted">Mbeya · Gold</div>
        </div>
        <p class="small mb-0">
          <a class="text-white text-decoration-underline" href="login.html" data-i18n="register.have_mid">Tayari una M-ID? Ingia</a>
        </p>
      </div>

      <!-- Form -->
      <div class="col-lg-7 d-flex align-items-center justify-content-center p-4 p-lg-5">
        <div class="w-100 mgrid-max-w-460">
          <div class="d-flex justify-content-end mb-3">
            <div class="btn-group btn-group-sm mgrid-lang-toggle" role="group" aria-label="Language / Lugha">
              <input type="radio" class="btn-check" name="mgridLang" id="mgridLangEn" value="en" autocomplete="off" />
              <label class="btn btn-sm btn-outline-secondary" for="mgridLangEn">EN</label>
              <input type="radio" class="btn-check" name="mgridLang" id="mgridLangSw" value="sw" autocomplete="off" />
              <label class="btn btn-sm btn-outline-secondary" for="mgridLangSw">SW</label>
            </div>
          </div>
          <div class="d-flex justify-content-between align-items-center mb-4">
            <div id="regStepIndicator" data-step="1" class="small text-muted w-100 text-center">
              <span class="fw-semibold text-dark" data-i18n="register.step_1">Hatua ya 1</span> ● — ○ <span class="text-muted" data-i18n="register.step_2">Hatua ya 2</span>
            </div>
          </div>
          <h1 class="h2 mgrid-section-heading mb-1" data-i18n="register.title">Fungua M-ID yako</h1>
          <p class="text-muted small mb-4" data-i18n="register.time_hint">Inachukua chini ya dakika 3</p>

          <form id="regStep1" data-mgrid-demo data-success-msg="Step 1 saved (demo). Continue to business info.">
            <div class="row g-2 mb-3">
              <div class="col-12 col-md-4">
                <label class="form-label" for="firstName" data-i18n="register.first_name">Jina la kwanza</label>
                <input type="text" class="form-control form-control-sm" id="firstName" name="firstName" required autocomplete="given-name" />
              </div>
              <div class="col-12 col-md-4">
                <label class="form-label" for="middleName" data-i18n="register.middle_name">Jina la kati</label>
                <input type="text" class="form-control form-control-sm" id="middleName" name="middleName" required autocomplete="additional-name" />
              </div>
              <div class="col-12 col-md-4">
                <label class="form-label" for="surname" data-i18n="register.surname">Ukoo</label>
                <input type="text" class="form-control form-control-sm" id="surname" name="surname" required autocomplete="family-name" />
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label" for="nidaNumber" data-i18n="register.nida">Namba ya NIDA</label>
              <input type="text" class="form-control form-control-sm" id="nidaNumber" name="nidaNumber" required />
            </div>
            <div class="mb-3">
              <label class="form-label" for="phone" data-i18n="register.phone">Namba ya simu</label>
              <div class="input-group">
                <span class="input-group-text">+255</span>
                <input type="tel" class="form-control form-control-sm" id="phone" name="phone" required autocomplete="tel" />
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label" for="email" data-i18n="register.email_optional">Barua pepe (si lazima)</label>
              <input type="email" class="form-control form-control-sm" id="email" name="email" autocomplete="email" />
            </div>
            <div class="mb-2">
              <label class="form-label" for="regPassword" data-i18n="register.password">Nenosiri</label>
              <input type="password" class="form-control form-control-sm" id="regPassword" name="regPassword" required minlength="8" autocomplete="new-password" />
              <div class="progress mt-2 mgrid-progress-h-6" aria-hidden="true">
                <div class="progress-bar bg-secondary" id="passwordStrengthBar" role="presentation"></div>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label" for="regPassword2" data-i18n="register.confirm_password">Thibitisha nenosiri</label>
              <input type="password" class="form-control form-control-sm" id="regPassword2" name="regPassword2" required autocomplete="new-password" />
            </div>
            <button type="button" class="btn btn-primary w-100" id="regBtnNext" data-i18n="register.continue_step_2">Endelea Hatua ya 2</button>
          </form>

          <form id="regStep2" class="d-none" data-mgrid-flow="register">
            <div class="mb-3">
              <span class="form-label d-block" data-i18n="register.has_business">Una biashara iliyosajiliwa?</span>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="biz" id="bizY" value="yes" />
                <label class="form-check-label" for="bizY" data-i18n="register.yes">Ndiyo</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="biz" id="bizN" value="no" checked />
                <label class="form-check-label" for="bizN" data-i18n="register.no">Hapana</label>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label" for="bizName" data-i18n="register.business_name">Jina la biashara</label>
              <input type="text" class="form-control" id="bizName" name="bizName" />
            </div>
            <div class="mb-3">
              <label class="form-label" for="bizType" data-i18n="register.business_type">Aina ya biashara</label>
              <select class="form-select" id="bizType" name="bizType">
                <option data-i18n="register.sole_prop">Mmiliki mmoja</option>
                <option data-i18n="register.company">Kampuni</option>
                <option data-i18n="register.cooperative">Ushirika</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label" for="bank" data-i18n="register.have_bank">Una akaunti ya benki?</label>
              <select class="form-select" id="bank" name="bank">
                <option value="yes" data-i18n="register.yes">Ndiyo</option>
                <option value="no" data-i18n="register.no">Hapana</option>
              </select>
            </div>
            <div class="mb-4">
              <label class="form-label" for="hear" data-i18n="register.hear_about">Umesikiaje kuhusu M-Grid?</label>
              <select class="form-select" id="hear" name="hear">
                <option data-i18n="register.clouds_media">Clouds Media</option>
                <option data-i18n="register.partner_referral">Kupitia mshirika</option>
                <option data-i18n="register.community_event">Tukio la jamii</option>
                <option data-i18n="register.other">Nyingine</option>
              </select>
            </div>
            <div class="d-flex gap-2">
              <button type="button" class="btn btn-outline-secondary flex-grow-1" id="regBtnBack" data-i18n="register.back">Rudi</button>
              <button type="submit" class="btn btn-primary flex-grow-1" data-i18n="register.create_mid">Tengeneza M-ID yangu</button>
            </div>
          </form>

          <p class="text-center small text-muted mt-4 d-lg-none">
            <a href="login.html" data-i18n="register.have_mid">Tayari una M-ID? Ingia</a>
          </p>
        </div>
      </div>
    </div>

    <div id="mgridToastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/mgrid-i18n.js"></script>
    <script src="../assets/js/mgrid-core.js"></script>
  </body>
</html>
